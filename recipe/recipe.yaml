schema_version: 1

context:
  name: gcloud-aio-kms
  version: 5.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/gcloud_aio_kms-${{ version }}.tar.gz
  sha256: 590583cb671ffb3166c9d8604921fbafb1c4182f2ea22462e3843f012c9381e1

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - gcloud-aio-auth >=3.1.0,<6.0.0

tests:
  - python:
      imports:
        - gcloud.aio.kms
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python Client for Google Cloud KMS
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/talkiq/gcloud-aio

extra:
  recipe-maintainers:
    - xylar
